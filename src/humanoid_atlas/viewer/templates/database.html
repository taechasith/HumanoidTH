{% extends "base.html" %}
{% block content %}
<h1>Database Browser</h1>
<form class="toolbar" method="get">
  <select name="table">{% for name in allowed %}<option value="{{ name }}" {{ "selected" if name == table else "" }}>{{ name }}</option>{% endfor %}</select>
  <input name="q" value="{{ q }}" placeholder="Search">
  <button class="primary" type="submit">Search</button>
  <a class="btn" href="/database/export.csv?table={{ table }}">CSV</a>
</form>
<div class="table-wrap"><table>
{% if rows %}
<thead><tr>{% for key in rows[0].keys() %}<th>{{ key }}</th>{% endfor %}</tr></thead>
<tbody>{% for row in rows %}<tr>{% for value in row.values() %}<td>{{ value }}</td>{% endfor %}</tr>{% endfor %}</tbody>
{% else %}<tbody><tr><td class="empty">No rows.</td></tr></tbody>{% endif %}
</table></div>
{% endblock %}
